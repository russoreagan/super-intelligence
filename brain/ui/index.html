<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brain</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080810;
    --surface: #0e0e1a;
    --border: #1e1e38;
    --text: #c8d4f0;
    --text-dim: #5a6080;
    --accent: #2244aa;
    --input-bg: #12121e;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Top bar ── */
  #topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 6px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    font-size: 11px;
    color: var(--text-dim);
  }
  #topbar .brand { color: var(--text); font-weight: 600; letter-spacing: 0.08em; font-size: 12px; }
  #topbar .sep { color: var(--border); }
  #emotion-badge {
    padding: 2px 9px;
    border-radius: 99px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    background: #333355;
    color: #aab;
    transition: background 0.6s, color 0.6s;
  }
  #topbar .stat span { color: #7090d0; }
  #ws-indicator {
    margin-left: auto;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #333;
    transition: background 0.4s;
  }
  #ws-indicator.connected { background: #22dd88; box-shadow: 0 0 6px #22dd88; }

  /* ── Main layout ── */
  #main {
    display: grid;
    grid-template-columns: 1fr 320px;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }

  /* ── Brain panel ── */
  #brain-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  #brain-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px 20px 8px;
    min-height: 0;
  }
  #brain-svg {
    display: block;
    width: 100%;
    height: 100%;
    max-width: 680px;
    object-fit: contain;
  }

  /* Region base styles */
  .region {
    fill: rgba(18, 28, 70, 0.6);
    stroke: rgba(255,255,255,0.10);
    stroke-width: 1;
    cursor: default;
    transition: fill 0.25s ease, filter 0.25s ease, stroke 0.25s ease;
    filter: brightness(1);
  }
  .region-inner {
    fill: rgba(10, 18, 50, 0.7);
    stroke: rgba(255,255,255,0.08);
    stroke-width: 0.8;
    transition: fill 0.25s ease, filter 0.25s ease, stroke 0.25s ease;
  }
  .region.active, .region-inner.active {
    stroke: rgba(255,255,255,0.55);
    stroke-width: 1.5;
  }
  #outline {
    fill: rgba(12, 20, 55, 0.5);
    stroke: rgba(80, 100, 180, 0.25);
    stroke-width: 1.5;
  }

  /* Active label */
  #active-label {
    text-align: center;
    padding: 4px 0 6px;
    font-size: 11px;
    color: var(--text-dim);
    min-height: 20px;
    letter-spacing: 0.04em;
    transition: color 0.3s;
    flex-shrink: 0;
  }
  #active-label.lit { color: #88aaff; }

  /* ── Neuromod bars (compact, bottom of brain panel) ── */
  #neuromod {
    padding: 6px 16px 8px;
    display: flex;
    gap: 12px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    align-items: center;
  }
  .nm-row {
    display: flex;
    align-items: center;
    gap: 5px;
    flex: 1;
  }
  .nm-label {
    font-size: 10px;
    color: var(--text-dim);
    font-weight: 600;
    white-space: nowrap;
    min-width: 28px;
    text-align: right;
  }
  .nm-track {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
  }
  .nm-fill {
    height: 100%;
    border-radius: 2px;
    width: 0%;
    transition: width 0.5s ease;
  }

  /* ── Right panel — Chat ── */
  #chat-panel {
    display: flex;
    flex-direction: column;
    border-left: 1px solid var(--border);
    overflow: hidden;
    font-size: 12px;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scroll-behavior: smooth;
    min-height: 0;
  }
  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    max-width: 90%;
    padding: 7px 11px;
    border-radius: 9px;
    line-height: 1.5;
    font-size: 12px;
    animation: fadein 0.2s ease;
  }
  @keyframes fadein { from { opacity:0; transform: translateY(3px); } to { opacity:1; transform: none; } }

  .msg-user {
    align-self: flex-end;
    background: #1a2a60;
    color: #ccd8ff;
    border-bottom-right-radius: 3px;
  }
  .msg-brain {
    align-self: flex-start;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 3px;
  }
  .msg-meta {
    font-size: 9px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .msg-system {
    align-self: center;
    color: var(--text-dim);
    font-size: 10px;
    font-style: italic;
  }
  .msg-thought {
    align-self: flex-start;
    color: #445580;
    font-size: 10px;
    font-style: italic;
    padding: 3px 8px;
    border-left: 2px solid #222244;
  }

  /* ── Turn log (collapsible thinking steps) ── */
  .turn-log {
    align-self: flex-start;
    width: 90%;
    border: 1px solid var(--border);
    border-radius: 7px 7px 0 0;
    border-bottom: none;
    font-size: 10px;
    color: var(--text-dim);
    background: rgba(14, 14, 26, 0.85);
  }
  .turn-log summary {
    padding: 5px 10px;
    cursor: pointer;
    list-style: none;
    user-select: none;
    letter-spacing: 0.03em;
    font-size: 9px;
  }
  .turn-log summary::-webkit-details-marker { display: none; }
  .turn-log summary::before { content: '▶ '; font-size: 8px; }
  details[open].turn-log summary::before { content: '▼ '; }
  .turn-log-body {
    padding: 6px 10px 8px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    border-top: 1px solid var(--border);
  }
  .log-step {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: #6070a0;
  }
  .log-step .log-bar {
    flex: 0 0 30px;
    height: 2px;
    background: rgba(255,255,255,0.05);
    border-radius: 1px;
    overflow: hidden;
  }
  .log-step .log-bar-fill {
    height: 100%;
    border-radius: 1px;
  }

  /* ── Quality badge ── */
  .quality-badge {
    margin-top: 4px;
    font-size: 9px;
    color: #4a5478;
    letter-spacing: 0.04em;
    min-height: 12px;
  }
  .quality-badge .qb-score { color: #6688cc; }
  .quality-badge .qb-delta-pos { color: #44dd88; }
  .quality-badge .qb-delta-neg { color: #ff6644; }

  /* ── Eval toggle button ── */
  #eval-toggle {
    padding: 2px 8px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 10px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.04em;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
  }
  #eval-toggle:hover { background: #1a1a30; color: var(--text); }
  #eval-toggle.active { background: #101a10; border-color: #336633; color: #44cc66; }

  /* Typing indicator */
  #typing {
    align-self: flex-start;
    display: none;
    gap: 4px;
    padding: 8px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 9px;
    border-bottom-left-radius: 3px;
    margin: 0 14px 4px;
  }
  #typing.visible { display: flex; }
  #typing span {
    width: 5px; height: 5px;
    background: #445580;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  #typing span:nth-child(2) { animation-delay: 0.2s; }
  #typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-4px); background: #8899cc; }
  }

  /* ── Bottom control bar (full width) ── */
  #control-bar {
    display: grid;
    grid-template-columns: auto auto 1fr auto;
    gap: 8px;
    align-items: center;
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    grid-column: 1 / -1;
  }

  /* Mic button — primary action, larger */
  #mic-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: #12121e;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, color 0.2s, border-color 0.2s, box-shadow 0.2s;
    flex-shrink: 0;
  }
  #mic-btn:hover { background: #1a1a30; color: var(--text); border-color: #334488; }
  #mic-btn.listening {
    background: #2a0a0a;
    border-color: #cc2222;
    color: #ff5555;
    box-shadow: 0 0 16px rgba(200,30,30,0.5);
    animation: mic-pulse 1.2s ease-in-out infinite;
  }
  #mic-btn.unsupported { opacity: 0.3; cursor: not-allowed; }
  @keyframes mic-pulse {
    0%, 100% { box-shadow: 0 0 10px rgba(200,30,30,0.4); }
    50%       { box-shadow: 0 0 24px rgba(220,40,40,0.75); }
  }

  /* Voice dropdown */
  #voice-select {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 11px;
    padding: 6px 10px;
    cursor: pointer;
    outline: none;
    max-width: 160px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #voice-select:focus { border-color: #334488; color: var(--text); }
  #voice-select option { background: #12121e; color: var(--text); }

  /* Text input */
  #msg-input {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 8px 12px;
    outline: none;
    resize: none;
    line-height: 1.4;
    max-height: 80px;
    min-height: 36px;
  }
  #msg-input:focus { border-color: #334488; }
  #msg-input::placeholder { color: var(--text-dim); }

  /* Send button */
  #send-btn {
    width: 36px;
    height: 36px;
    border-radius: 7px;
    background: #1a3080;
    border: none;
    color: #8899cc;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, color 0.2s;
    flex-shrink: 0;
  }
  #send-btn:hover { background: #2244aa; color: #ccd8ff; }
  #send-btn:disabled { opacity: 0.35; cursor: default; }

  /* ── Live transcript bar ── */
  #transcript-bar {
    display: none;
    padding: 4px 14px;
    background: rgba(30,10,10,0.8);
    border-top: 1px solid #3a1a1a;
    font-size: 10px;
    color: #cc6666;
    font-style: italic;
    letter-spacing: 0.02em;
    flex-shrink: 0;
    grid-column: 1 / -1;
  }
  #transcript-bar.visible { display: block; }

  /* ── Bottom wrapper so transcript + control bar stack correctly ── */
  #bottom {
    display: flex;
    flex-direction: column;
    grid-column: 1 / -1;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <span class="brand">&#x1F9E0; Brain</span>
  <span class="sep">·</span>
  <span class="stat">session <span id="stat-session">—</span></span>
  <span class="sep">·</span>
  <span id="emotion-badge">neutral</span>
  <span class="sep">·</span>
  <span class="stat"><span id="stat-calls">0</span> LLM calls</span>
  <span class="sep">·</span>
  <span class="stat"><span id="stat-elapsed">—</span></span>
  <button id="eval-toggle" title="Toggle intensive eval mode (runs baseline on every turn)">⚗ Eval</button>
  <div id="ws-indicator" title="WebSocket"></div>
</div>

<!-- Main -->
<div id="main">

  <!-- Brain panel -->
  <div id="brain-panel">

    <!-- Active cluster label -->

    <!-- Neuromod bars (horizontal, compact) -->

  <!-- Right: Chat (compact) -->

<!-- Bottom bar (transcript + controls, full width) -->

    <button id="mic-btn" title="Click to speak (or press Space)">&#x1F3A4;</button>
    <select id="voice-select" title="AI voice">
      <option value="">voice…</option>
    </select>
    <textarea id="msg-input" rows="1" placeholder="Type a message…"></textarea>
    <button id="send-btn">&#x2192;</button>
  </div>
</div>

<script>
// ── Region config ──────────────────────────────────────────────────────────────
const REGIONS = {
  frontal:      { color: '#4488ff', label: 'Frontal lobe — executive & response' },
  parietal:     { color: '#44cc66', label: 'Parietal lobe — context & session state' },
  occipital:    { color: '#cc44ff', label: 'Occipital lobe — vision processing' },
  temporal:     { color: '#ff8822', label: 'Temporal lobe — language understanding' },
  hippocampus:  { color: '#00ffaa', label: 'Hippocampus — memory recall & encoding' },
  thalamus:     { color: '#ffffff', label: 'Thalamus — routing & attention' },
  hypothalamus: { color: '#ffaa00', label: 'Hypothalamus — drives & affect' },
  brainstem:    { color: '#ff6600', label: 'Brainstem — autonomic & articulation' },
  cerebellum:   { color: '#00ccff', label: 'Cerebellum — learned sequences' },
};

const CLUSTER_MAP = {
  frontal:      'frontal',
  parietal:     'parietal',
  occipital:    'occipital',
  temporal:     'temporal',
  hippocampus:  'hippocampus',
  thalamus:     'thalamus',
  hypothalamus: 'hypothalamus',
  brainstem:    'brainstem',
  dmn:          'frontal',
  metacognition:'parietal',
};

const EMOTION_COLORS = {
  joy:            { bg: '#1a4020', color: '#44ff88' },
  excited:        { bg: '#1a3a10', color: '#88ff44' },
  enthusiasm:     { bg: '#1a3a10', color: '#aaff44' },
  curious:        { bg: '#102040', color: '#44aaff' },
  'curious-uncertain': { bg: '#102030', color: '#4488cc' },
  warm:           { bg: '#2a2010', color: '#ffcc44' },
  confident:      { bg: '#101a40', color: '#6688ff' },
  thoughtful:     { bg: '#141428', color: '#8899cc' },
  content:        { bg: '#121224', color: '#7788aa' },
  neutral:        { bg: '#1a1a2a', color: '#7788aa' },
  flat:           { bg: '#141414', color: '#555566' },
  restless:       { bg: '#201810', color: '#cc8844' },
  anxious:        { bg: '#2a1a10', color: '#ffaa44' },
  inhibited:      { bg: '#1a1020', color: '#9966aa' },
  'cautious-agitated': { bg: '#2a1010', color: '#ff8844' },
  agitated:       { bg: '#2a1010', color: '#ff4444' },
};

// ── Cluster icons for turn log ─────────────────────────────────────────────────
const CLUSTER_ICONS = {
  frontal: '🎯', temporal: '👁', hippocampus: '💾', hypothalamus: '⚡',
  thalamus: '🔀', parietal: '📊', occipital: '👀', brainstem: '⚙',
  cerebellum: '🔄', dmn: '💭', baseline: '📏', scorer: '⚖',
};

// ── State ──────────────────────────────────────────────────────────────────────
let ws = null;
let totalCalls = 0;
let activeGlows = {};
let sessionId = '—';

// Eval + turn-log state
let pendingActivations = [];   // activation events buffered during current turn
let currentTurnId = null;      // turn_id currently in progress
let turnQualityScores = {};    // turn_id → quality_score event
let evalIntensive = false;     // eval mode toggle

// ── ElevenLabs voice list ──────────────────────────────────────────────────────
async function loadVoices() {
  try {
    const res = await fetch('/voices');
    const data = await res.json();
    const sel = document.getElementById('voice-select');
    const voices = data.voices || [];
    if (voices.length === 0) return;
    // Clear placeholder
    sel.innerHTML = '';
    voices.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v.voice_id;
      opt.textContent = v.name;
      sel.appendChild(opt);
    });
    // Restore saved selection
    const saved = localStorage.getItem('brain_voice_id');
    if (saved && voices.find(v => v.voice_id === saved)) {
      sel.value = saved;
    }
  } catch (e) {
    console.warn('Could not load voices:', e);
  }
}

document.getElementById('voice-select').addEventListener('change', function() {
  const vid = this.value;
  if (!vid) return;
  localStorage.setItem('brain_voice_id', vid);
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'set_voice', voice_id: vid }));
  }
});

// ── WebSocket ──────────────────────────────────────────────────────────────────
function connect() {
  // Close any existing connection cleanly before opening a new one,
  // so we never accumulate multiple live connections to the server.
  if (ws && ws.readyState !== WebSocket.CLOSED) {
    ws.onclose = null; // prevent the reconnect loop from firing again
    ws.close();
  }

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    document.getElementById('ws-indicator').classList.add('connected');
    // Re-send active voice on reconnect
    const vid = document.getElementById('voice-select').value;
    if (vid) ws.send(JSON.stringify({ type: 'set_voice', voice_id: vid }));
  };

  ws.onclose = () => {
    document.getElementById('ws-indicator').classList.remove('connected');
    setTimeout(connect, 2000);
  };

  ws.onerror = () => ws.close();
  ws.onmessage = (ev) => handle(JSON.parse(ev.data));
}

function sendMessage(text) {
  if (!ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ type: 'user_message', text }));
}

// ── Event handler ──────────────────────────────────────────────────────────────
function handle(msg) {
  switch (msg.type) {
    case 'activation': {
      const regionId = CLUSTER_MAP[msg.cluster];
      if (regionId) {
        const cfg = REGIONS[regionId];
        if (cfg) activateRegion(regionId, msg.intensity, cfg.color, cfg.label, msg.note);
      }
      // Buffer for collapsible turn log (skip 'done' pulses)
      if (currentTurnId && msg.note !== 'done' && msg.intensity > 0) {
        pendingActivations.push({ cluster: msg.cluster, intensity: msg.intensity, note: msg.note });
      }
      break;
    }
    case 'neuromod': {
      ['ACh', 'DA', 'GABA', 'Glu'].forEach(ch => {
        const v = msg[ch];
        if (v === undefined) return;
        document.getElementById(`nm-${ch}`).style.width = Math.round(v * 100) + '%';
      });
      break;
    }
    case 'emotion': {
      const badge = document.getElementById('emotion-badge');
      badge.textContent = msg.emotion;
      const theme = EMOTION_COLORS[msg.emotion] || EMOTION_COLORS['neutral'];
      badge.style.background = theme.bg;
      badge.style.color = theme.color;
      break;
    }
    case 'turn_start': {
      currentTurnId = msg.turn_id || null;
      pendingActivations = [];
      if (msg.user_input) appendMessage('user', msg.user_input);
      setTyping(true);
      document.getElementById('send-btn').disabled = true;
      if (msg.session_id) {
        sessionId = msg.session_id;
        document.getElementById('stat-session').textContent = sessionId;
      }
      break;
    }
    case 'turn_end': {
      setTyping(false);
      document.getElementById('send-btn').disabled = false;
      if (msg.response) {
        const calls = msg.llm_calls || 0;
        const elapsed = msg.elapsed_s ? msg.elapsed_s.toFixed(1) + 's' : '';
        totalCalls += calls;
        document.getElementById('stat-calls').textContent = totalCalls;
        document.getElementById('stat-elapsed').textContent = elapsed;
        appendBrainMessage(msg.turn_id, msg.response, calls, elapsed);
      }
      currentTurnId = null;
      setTimeout(() => {
        Object.keys(REGIONS).forEach(r => deactivateRegion(r));
        setActiveLabel('—', false);
      }, 800);
      break;
    }
    case 'quality_score': {
      turnQualityScores[msg.turn_id] = msg;
      // Update badge if message bubble already rendered
      const badge = document.querySelector(`.quality-badge[data-turn-id="${msg.turn_id}"]`);
      if (badge) updateQualityBadge(badge, msg);
      break;
    }
    case 'stream_thought': {
      if (msg.thought) appendThought(msg.thought);
      break;
    }
    case 'transcript': handleTranscriptEvent(msg); break;
    case 'transcript_error': handleTranscriptError(msg); break;
  }
}

// ── SVG region activation ──────────────────────────────────────────────────────
function activateRegion(regionId, intensity, color, label, note) {
  const el = document.getElementById('region-' + regionId);
  if (!el) return;
  if (activeGlows[regionId]) { clearTimeout(activeGlows[regionId]); delete activeGlows[regionId]; }

  const brightness = 1 + intensity * 2.5;
  const blurPx = Math.round(intensity * 22);
  const opacity = 0.35 + intensity * 0.65;

  el.style.fill = hexWithAlpha(color, opacity);
  el.style.filter = `brightness(${brightness}) drop-shadow(0 0 ${blurPx}px ${color})`;
  el.classList.add('active');

  const displayLabel = note ? `${label.split('—')[0].trim()} — ${note}` : label;
  setActiveLabel(displayLabel, true);

  if (intensity > 0) {
    activeGlows[regionId] = setTimeout(() => deactivateRegion(regionId), 1800);
  } else {
    deactivateRegion(regionId);
  }
}

function deactivateRegion(regionId) {
  const el = document.getElementById('region-' + regionId);
  if (!el) return;
  el.style.fill = '';
  el.style.filter = '';
  el.classList.remove('active');
  delete activeGlows[regionId];
}

function setActiveLabel(text, lit) {
  const el = document.getElementById('active-label');
  el.textContent = text;
  el.className = lit ? 'lit' : '';
}

function hexWithAlpha(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha.toFixed(2)})`;
}

// ── Chat rendering ─────────────────────────────────────────────────────────────
function appendMessage(role, text, meta) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg msg-${role}`;
  div.textContent = text;
  if (meta) {
    const m = document.createElement('div');
    m.className = 'msg-meta';
    m.textContent = meta;
    div.appendChild(m);
  }
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function appendBrainMessage(turnId, text, calls, elapsed) {
  const msgs = document.getElementById('messages');

  // ── Collapsible turn log (above the bubble) ────────────────────────────
  const steps = pendingActivations;
  if (steps.length > 0) {
    const details = document.createElement('details');
    details.className = 'turn-log';
    const summary = document.createElement('summary');
    summary.textContent = `⚙ ${steps.length} steps · ${calls} LLM calls · ${elapsed}`;
    details.appendChild(summary);

    const body = document.createElement('div');
    body.className = 'turn-log-body';
    steps.forEach(a => {
      const icon = CLUSTER_ICONS[a.cluster] || '·';
      const regionId = CLUSTER_MAP[a.cluster];
      const clrColor = (regionId && REGIONS[regionId]) ? REGIONS[regionId].color : '#8899cc';
      const pct = Math.round(a.intensity * 100);
      const step = document.createElement('div');
      step.className = 'log-step';
      step.innerHTML =
        `<span>${icon} ${a.cluster}${a.note ? ' — ' + a.note : ''}</span>` +
        `<div class="log-bar"><div class="log-bar-fill" style="width:${pct}%;background:${clrColor}"></div></div>`;
      body.appendChild(step);
    });
    details.appendChild(body);
    msgs.appendChild(details);
  }

  // ── Brain response bubble ──────────────────────────────────────────────
  const div = document.createElement('div');
  div.className = 'msg msg-brain';
  if (turnId) div.dataset.turnId = turnId;
  div.textContent = text;

  if (calls || elapsed) {
    const m = document.createElement('div');
    m.className = 'msg-meta';
    m.textContent = (calls ? `${calls} LLM calls · ` : '') + elapsed;
    div.appendChild(m);
  }

  // Quality badge (populated now if quality_score already arrived, else filled in later)
  const badge = document.createElement('div');
  badge.className = 'quality-badge';
  if (turnId) badge.dataset.turnId = turnId;
  const qs = turnId ? turnQualityScores[turnId] : null;
  if (qs) updateQualityBadge(badge, qs);
  div.appendChild(badge);

  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  pendingActivations = [];
}

function updateQualityBadge(badge, qs) {
  const score   = typeof qs.score         === 'number' ? qs.score.toFixed(2) : '—';
  const coh     = typeof qs.coherence     === 'number' ? qs.coherence.toFixed(2) : '—';
  const fit     = typeof qs.emotional_fit === 'number' ? qs.emotional_fit.toFixed(2) : '—';
  const count   = qs.drafter_count || 1;
  const memIcon = qs.memory_used ? ' · 💾' : '';
  const drafts  = count > 1 ? ` · ${count} drafts` : '';
  badge.innerHTML =
    `<span class="qb-score">coh ${coh} · fit ${fit} · overall ${score}</span>${memIcon}${drafts}`;
}

function appendThought(text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg msg-thought';
  div.textContent = '· ' + text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function setTyping(visible) {
  document.getElementById('typing').className = visible ? 'visible' : '';
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}

// ── Input handling ─────────────────────────────────────────────────────────────
function send() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  sendMessage(text);
}

document.getElementById('send-btn').addEventListener('click', send);
document.getElementById('msg-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 80) + 'px';
});

// ── Voice input ────────────────────────────────────────────────────────────────
const micBtn = document.getElementById('mic-btn');
const transcriptBar = document.getElementById('transcript-bar');
const msgInput = document.getElementById('msg-input');
let micActive = false;
let mediaRecorder = null;
let micStream = null;
let finalTranscript = '';
let autoSendTimer = null;
const AUTO_SEND_DELAY_MS = 1500; // ms of silence after final transcript before auto-sending

function _micReset() {
  micActive = false;
  micBtn.classList.remove('listening');
  micBtn.title = 'Click to speak (or press Space)';
  transcriptBar.classList.remove('visible');
  transcriptBar.textContent = '';
}

async function startListening() {
  if (micActive) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    transcriptBar.textContent = 'Not connected — wait for reconnect.';
    transcriptBar.classList.add('visible');
    setTimeout(() => transcriptBar.classList.remove('visible'), 2500);
    return;
  }
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (err) {
    transcriptBar.textContent = 'Microphone access denied.';
    transcriptBar.classList.add('visible');
    setTimeout(() => transcriptBar.classList.remove('visible'), 3000);
    return;
  }

  ws.send(JSON.stringify({ type: 'voice_start' }));
  finalTranscript = '';
  msgInput.value = '';

  const mime = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus']
    .find(m => MediaRecorder.isTypeSupported(m)) || '';
  mediaRecorder = new MediaRecorder(micStream, mime ? { mimeType: mime } : {});
  mediaRecorder.ondataavailable = (e) => {
    if (e.data && e.data.size > 0 && ws && ws.readyState === WebSocket.OPEN)
      e.data.arrayBuffer().then(buf => ws.send(buf));
  };
  mediaRecorder.start(250);

  micActive = true;
  micBtn.classList.add('listening');
  micBtn.title = 'Listening… click to stop';
  transcriptBar.textContent = 'Listening…';
  transcriptBar.classList.add('visible');
}

function stopListening(autoSend = false) {
  if (!micActive) return;
  clearTimeout(autoSendTimer);
  autoSendTimer = null;
  _micReset();
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  mediaRecorder = null;
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'voice_stop' }));

  const text = finalTranscript.trim() || msgInput.value.trim();
  finalTranscript = '';
  if (autoSend && text) {
    msgInput.value = '';
    msgInput.style.height = 'auto';
    sendMessage(text);
    // don't appendMessage here — turn_start event from server is the single source of truth
  }
}

function handleTranscriptEvent(msg) {
  if (!micActive) return;
  if (msg.is_final) {
    finalTranscript += (finalTranscript ? ' ' : '') + msg.text;
    msgInput.value = finalTranscript.trim();
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 80) + 'px';
    transcriptBar.textContent = '✓ ' + finalTranscript.trim();

    // Auto-send after pause — keep mic open for continuous conversation
    clearTimeout(autoSendTimer);
    autoSendTimer = setTimeout(() => {
      const text = finalTranscript.trim();
      if (text && micActive) {
        finalTranscript = '';
        msgInput.value = '';
        msgInput.style.height = 'auto';
        sendMessage(text);
        // don't appendMessage here — turn_start event from server is the single source of truth
        transcriptBar.textContent = 'Listening…';
      }
    }, AUTO_SEND_DELAY_MS);
  } else {
    // Interim result — user still speaking, cancel the auto-send timer
    clearTimeout(autoSendTimer);
    autoSendTimer = null;
    transcriptBar.textContent = msg.text || (finalTranscript ? '✓ ' + finalTranscript : 'Listening…');
  }
}

function handleTranscriptError(msg) {
  transcriptBar.textContent = '⚠ ' + (msg.msg || 'Voice error');
  transcriptBar.classList.add('visible');
  stopListening(false);
  setTimeout(() => transcriptBar.classList.remove('visible'), 3000);
}

micBtn.addEventListener('click', () => {
  if (micActive) stopListening(true);
  else startListening();
});

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && document.activeElement !== msgInput && !e.repeat) {
    e.preventDefault();
    if (micActive) stopListening(true);
    else startListening();
  }
});

// ── Eval mode toggle ──────────────────────────────────────────────────────────
const evalToggleBtn = document.getElementById('eval-toggle');
evalToggleBtn.addEventListener('click', () => {
  evalIntensive = !evalIntensive;
  evalToggleBtn.classList.toggle('active', evalIntensive);
  evalToggleBtn.title = evalIntensive
    ? 'Intensive eval ON (every turn) — click to disable'
    : 'Toggle intensive eval mode (runs baseline on every turn)';
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'eval_mode', intensive: evalIntensive }));
  }
});

// ── Boot ───────────────────────────────────────────────────────────────────────
loadVoices();
connect();
</script>
</body>
</html>
