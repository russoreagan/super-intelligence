name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install uv
      - name: Install deps
        run: uv sync --all-groups
      - name: Ruff lint
        run: uv run ruff check brain tests
      - name: Ruff format check
        run: uv run ruff format --check brain tests
      - name: Tests
        run: uv run pytest tests/ -v --timeout=30
      - name: Bandit security scan
        run: uv run bandit -r brain -ll -q
      - name: pip-audit
        run: uv run pip-audit --ignore-vuln GHSA-2wem-jxmx-mq3h
